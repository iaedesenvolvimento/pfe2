<!-- Esclarece para o mecanismo (robo) de busca do navegador que esta pagina
  é um documento HTML NA SUA VERSAO MAIS RECENTE, QUE  É HTML 5.2-->
<!DOCTYPE html>

<!--Diz para o mecanismo de busca (robo) de busca do navegador 
que o conteudo desta pagina esta no idioma portugues brasileiro-->
<html lang="pt-br">

<!--Dentro da tag head, o desenvolvedor especifica as configuracoes da página ao navegador, como por exemplo, o titulo do documento da pagina , o unicode(dicionario de alfabetos de diversos idiomas que pertencem a diversos países). O UNICODE completo é o UTF8, a qual contem praticamente caracteres de alfabetos do mundo todo.

Se o desenvolvedor omitir a linha 13 ou charset segue o padrao ANSI (Instituto Nacional de Padroes Americano)-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--É o título do documento da pagina-->
  <title>Bordas com Estilo</title>
  <link rel="stylesheet" href="estilo_border.css" type="text/css">

</head>
<!--É o corpo da página, ou seja, a parte visual da pagina-->

<body>
  <!--É o cabecalho do conteudo da pagina-->
  <header>
    <!--É o titulo principal do conteudo da pagina-->
    <h1 id="titulo">Border Radius</h1>
  </header>
  <section id="caixa1">
    <p>A Propriedade border-radius define o raio (arredondamento) dos cantos da caixa.</p>
  </section>
  <section id="caixa2">
    <p>Se dois valores forem definidos, o primeiro será para o canto superior esquerdo e inferior direito. O segundo
      para o canto superior direito e inferior esquerdo.</p>
  </section>
</body>

</html>
