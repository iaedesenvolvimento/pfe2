<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="css/estilo_form_CPF_CNPJ.css" type="text/css">
    <script src="js/jquery-3.6.0min.js"></script>
    <script src="js/script.js" defer></script>
</head>

<body>
    <header>
        <h1 id="titulo">Formulário Contato</h1>
    </header>
    <section class="container_formulario">
        <form action="">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="pessoa" class="linha">
                    <input type="radio" name="pessoa" id="pessoaid" value="fisica" required>Pessoa Física&nbsp;&nbsp;
                    <input type="radio" name="pessoa" id="pessoaid" value="juridica" required>Pessoa Jurídica
                </label>

                <!--NOVO CAMPO (CPF OU CNPJ)-->
                <section id="novoCampo"></section>

                <!--NOME DO USUÁRIO-->  
                <label for="nome" class="linha"><span>Nome</span>
                    <input type="text" name="nome" id="nomeid" class="caixa_texto" placeholder="Nome Completo" required>
                </label>

                <!--EMAIL DO USUÁRIO-->
                <label for="email" class="linha"><span>Email</span>
                    <input type="email" name="email" id="emaiid" class="caixa_texto" placeholder="name@email.com"
                        required>
                </label>

                <!--LOGRADOURO DO USUÁRIO-->
                <label for="endereco" class="linha"><span>Endereço</span>
                    <input type="text" name="endereco" id="enderecoid" class="caixa_texto" placeholder="Rua/Av./Alameda"
                        required>
                </label>

                <!--BAIRRO DO USUÁRIO-->
                <label for="bairro" class="linha"><span>Bairro</span>
                    <input type="text" name="bairro" id="bairroid" class="caixa_texto" placeholder="Pq/Jd/Vila"
                        required>
                </label>

                <!--CIDADE DO USUÁRIO-->
                <label for="cidade" class="linha"><span>Cidade</span>
                    <input type="text" name="cidade" id="cidadeid" class="caixa_texto" required>&nbsp;&nbsp;
                    <select name="UF" id="UFid">
                        <option value="AC">AC</option>
                        <option value="AL">AL</option>
                        <option value="AM">AM</option>
                        <option value="AP">AP</option>
                        <option value="BA">BA</option>
                        <option value="CE">CE</option>
                        <option value="DF">DF</option>
                        <option value="ES">ES</option>
                        <option value="MA">MA</option>
                        <option value="MG">MG</option>
                        <option value="MS">MS</option>
                        <option value="MT">MT</option>
                        <option value="PA">PA</option>
                        <option value="PB">PB</option>
                        <option value="PE">PE</option>
                        <option value="PI">PI</option>
                        <option value="PR">PR</option>
                        <option value="RJ">RJ</option>
                        <option value="RN">RN</option>
                        <option value="RO">RO</option>
                        <option value="RR">RR</option>
                        <option value="RS">RS</option>
                        <option value="SC">SC</option>
                        <option value="SE">SE</option>
                        <option value="SP" selected>SP</option>
                        <option value="TO">TO</option>
                    </select>
                <span id="CEP">CEP</span>
                <input type="text" name="cep" id="cepid" class="caixa_texto" placeholder="xxxxx-xxx" pattern="[0-9]{8}" required maxlength="8">
            </label>
            </fieldset>

            <p>
                <input type="submit" value="Enviar" class="botao">&nbsp;&nbsp;
                <input type="reset" value="Apagar" class="botao">
            </p>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
